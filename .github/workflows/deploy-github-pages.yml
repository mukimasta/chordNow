# 推送到默认分支后构建 dist 并部署到 GitHub Pages。
#
# 若 deploy 报 404 / Failed to create deployment：打开
#   Settings → Pages → Build and deployment → Source 选「GitHub Actions」
# 保存后再跑一次 workflow（或 push 触发）。
#
# 参考：https://github.com/actions/starter-workflows/blob/main/pages/astro.yml

name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install and build
        env:
          # configure-pages 的 base_path 与仓库 Pages 路径一致；根站点时为空，拼接后为 "/"
          GITHUB_PAGES_BASE: ${{ steps.pages.outputs.base_path }}/
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
